{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Party | NexusContracts{% endblock %}
{% block page_title %}{% if editing %}Edit Party{% else %}New Party{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Contact Person</label>
        <input type="text" name="contact_person" value="{{ record.contact_person|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Party Type</label>
        <select name="party_type">
          <option value="client" {% if record.party_type == 'client' %}selected{% endif %}>Client</option>
          <option value="vendor" {% if record.party_type == 'vendor' %}selected{% endif %}>Vendor</option>
          <option value="partner" {% if record.party_type == 'partner' %}selected{% endif %}>Partner</option>
          <option value="employee" {% if record.party_type == 'employee' %}selected{% endif %}>Employee</option>
        </select>
      </div>
      <div class="form-group">
        <label>Active Contracts</label>
        <input type="number" name="active_contracts" value="{{ record.active_contracts|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Party</button>
      <a href="/parties/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
