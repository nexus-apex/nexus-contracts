{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Contract | NexusContracts{% endblock %}
{% block page_title %}{% if editing %}Edit Contract{% else %}New Contract{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Party</label>
        <input type="text" name="party" value="{{ record.party|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Contract Type</label>
        <select name="contract_type">
          <option value="service" {% if record.contract_type == 'service' %}selected{% endif %}>Service</option>
          <option value="employment" {% if record.contract_type == 'employment' %}selected{% endif %}>Employment</option>
          <option value="nda" {% if record.contract_type == 'nda' %}selected{% endif %}>NDA</option>
          <option value="lease" {% if record.contract_type == 'lease' %}selected{% endif %}>Lease</option>
          <option value="vendor" {% if record.contract_type == 'vendor' %}selected{% endif %}>Vendor</option>
        </select>
      </div>
      <div class="form-group">
        <label>Value</label>
        <input type="number" step="0.01" name="value" value="{{ record.value|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="start_date" value="{{ record.start_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" name="end_date" value="{{ record.end_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="expired" {% if record.status == 'expired' %}selected{% endif %}>Expired</option>
          <option value="terminated" {% if record.status == 'terminated' %}selected{% endif %}>Terminated</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Contract</button>
      <a href="/contracts/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
